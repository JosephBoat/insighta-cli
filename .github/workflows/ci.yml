name: CLI CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 \
            --exclude=venv,__pycache__ \
            --ignore=E501,W503,E302,E303,W291,W293 \
            --statistics || true

      - name: Check CLI installs correctly
        run: insighta --help

      - name: Check all commands exist
        run: |
          insighta login --help
          insighta logout --help
          insighta whoami --help
          insighta profiles --help
          insighta profiles list --help
          insighta profiles get --help
          insighta profiles search --help
          insighta profiles create --help
          insighta profiles export --help